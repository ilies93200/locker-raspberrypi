<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changer le mot de passe</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="kiosk">
        <div class="kiosk-card">
            <h1>🔐 Changement de mot de passe</h1>
            <p style="text-align: center; color: #666; margin-bottom: 30px;">
                Pour des raisons de sécurité, vous devez changer votre mot de passe temporaire.
            </p>
            
            <div id="alert" style="display: none;"></div>
            
            <form id="changePasswordForm">
                <div class="form-group">
                    <label for="new_password">Nouveau mot de passe</label>
                    <input type="password" id="new_password" name="new_password" 
                           minlength="6" required>
                    <small style="color: #666;">Minimum 6 caractères</small>
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm_password" name="confirm_password" 
                           minlength="6" required>
                </div>
                
                <button type="submit" class="btn btn-success">Changer le mot de passe</button>
            </form>
        </div>
    </div>
    
    <script src="/static/js/change-password.js"></script>
</body>
</html>
