<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récupérer mon colis</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="kiosk">
        <div class="kiosk-card">
            <h1>📦 Récupérer mon colis</h1>
            
            <div id="alert" style="display: none;"></div>
            
            <form id="retraitForm">
                <div class="form-group">
                    <label for="code_retrait">Code de retrait</label>
                    <input type="text" id="code_retrait" name="code_retrait" 
                           placeholder="Ex: 3A7B2C9D" required
                           maxlength="8" style="text-transform: uppercase; font-size: 24px; text-align: center; letter-spacing: 4px;">
                </div>
                
                <button type="submit" class="btn btn-success">Ouvrir le casier</button>
            </form>
            
            <p style="text-align: center; margin-top: 30px; color: #666;">
                Entrez le code de retrait à 8 caractères (chiffres 0-9 et lettres A-D)
            </p>
        </div>
    </div>
    
    <script src="/static/js/client.js"></script>
</body>
</html>
