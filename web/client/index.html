<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récupérer mon colis</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .code-display {
            font-size: 48px;
            letter-spacing: 12px;
            text-align: center;
            padding: 20px;
            background: #1a1a2e;
            border-radius: 10px;
            color: #00ff88;
            font-family: monospace;
            min-height: 80px;
            margin-bottom: 20px;
            border: 3px solid #00ff88;
        }
        .code-display.empty {
            color: #666;
        }
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .btn-erase {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-erase:hover {
            background: #ee5a5a;
        }
        .btn-validate {
            background: #00ff88;
            color: #1a1a2e;
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-validate:hover {
            background: #00cc6a;
        }
        .status {
            text-align: center;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .instructions {
            text-align: center;
            color: #888;
            margin-top: 20px;
            font-size: 14px;
        }
        .keyboard-hint {
            display: inline-block;
            background: #333;
            padding: 5px 10px;
            border-radius: 5px;
            margin: 2px;
        }
    </style>
</head>
<body>
    <div class="kiosk">
        <div class="kiosk-card">
            <h1>📦 Récupérer mon colis</h1>
            
            <div id="alert" style="display: none;"></div>
            
            <div class="instructions">
                <p>Utilisez le <strong>clavier physique</strong> pour taper votre code</p>
                <p>
                    <span class="keyboard-hint">*</span> Effacer &nbsp;&nbsp;
                    <span class="keyboard-hint">#</span> Valider
                </p>
            </div>
            
            <div style="margin: 30px 0;">
                <label style="display: block; text-align: center; margin-bottom: 10px; color: #888;">Code de retrait</label>
                <div id="codeDisplay" class="code-display empty">________</div>
            </div>
            
            <div id="statusBox" class="status" style="display: none;"></div>
            
            <div class="btn-grid">
                <button id="btnErase" class="btn-erase">🗑️ Effacer</button>
                <button id="btnValidate" class="btn-validate">✅ Valider</button>
            </div>
            
            <div style="margin-top: 30px; text-align: center;">
                <p style="color: #666; font-size: 12px;">
                    Le code s'affiche automatiquement quand vous tapez sur le clavier
                </p>
            </div>
        </div>
    </div>
    
    <script src="/static/js/client.js"></script>
</body>
</html>
